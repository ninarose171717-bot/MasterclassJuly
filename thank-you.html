<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>You're in — Nina Rose</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --cream: #FAF8F4;
      --warm: #F2EDE4;
      --sand: #E4D9C8;
      --taupe: #B8A090;
      --dark: #2A1F18;
      --mid: #4A3428;
      --accent: #9B7355;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--dark);
      color: var(--cream);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 48px 24px;
    }

    .heart {
      font-size: 32px;
      margin-bottom: 32px;
      opacity: 0.7;
    }

    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(30px, 5vw, 48px);
      font-weight: 300;
      font-style: italic;
      line-height: 1.2;
      margin-bottom: 40px;
      color: var(--cream);
    }

    h1 em {
      color: var(--accent);
    }

    .inbox-line {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(17px, 2.2vw, 20px);
      font-style: italic;
      color: var(--taupe);
      line-height: 1.7;
      max-width: 520px;
      margin: 0 auto;
    }

    .inbox-block {
      margin-bottom: 40px;
    }

    .date-pill {
      display: inline-block;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 100px;
      padding: 10px 24px;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--taupe);
      margin-bottom: 32px;
    }

    .divider {
      width: 1px;
      height: 48px;
      background: rgba(255,255,255,0.1);
      margin: 0 auto 64px;
    }

    .share-section {
      max-width: 480px;
    }

    .share-label {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(18px, 2.5vw, 22px);
      font-style: italic;
      color: var(--taupe);
      line-height: 1.6;
      margin-bottom: 40px;
    }

    .share-btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: transparent;
      border: 1px solid var(--taupe);
      color: var(--taupe);
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 14px 28px;
      border-radius: 100px;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }

    .share-btn:hover {
      border-color: var(--cream);
      color: var(--cream);
    }

    .share-btn.copied {
      border-color: var(--accent);
      color: var(--accent);
    }

    .countdown {
      display: flex;
      gap: 32px;
      justify-content: center;
      margin: 0 0 28px;
    }

    .countdown-unit {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }

    .countdown-number {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(28px, 4.5vw, 44px);
      font-weight: 300;
      font-style: italic;
      color: var(--cream);
      line-height: 1;
      min-width: 44px;
      text-align: center;
    }

    .countdown-label {
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--taupe);
    }

    .countdown-caption {
      font-family: 'Cormorant Garamond', serif;
      font-size: 15px;
      font-style: italic;
      color: var(--taupe);
      margin-bottom: 40px;
    }

    .check-inbox {
      margin-top: 40px;
      font-size: 13px;
      color: rgba(184,160,144,0.6);
      letter-spacing: 0.05em;
      line-height: 1.7;
    }
  </style>
</head>
<body>

  <div class="heart">♡</div>

  <h1>You're in.<br>I cannot wait to<br>see you on <em>July 7.</em></h1>

  <div class="inbox-block">
    <p class="inbox-line">Check your inbox.</p>
    <p class="inbox-line">Your confirmation email and Zoom link are waiting for you.</p>
  </div>

  <div class="countdown">
    <div class="countdown-unit"><span class="countdown-number" id="cd-days">--</span><span class="countdown-label">Days</span></div>
    <div class="countdown-unit"><span class="countdown-number" id="cd-hours">--</span><span class="countdown-label">Hours</span></div>
    <div class="countdown-unit"><span class="countdown-number" id="cd-minutes">--</span><span class="countdown-label">Min</span></div>
    <div class="countdown-unit"><span class="countdown-number" id="cd-seconds">--</span><span class="countdown-label">Sec</span></div>
  </div>
  <p class="countdown-caption">until we meet on July 7 ♡</p>

  <div class="share-section">
    <p class="share-label">If someone's name came to heart just now,<br>send this to them.</p>
    <button class="share-btn" onclick="copyLink(this)">
      <span>Copy the link</span>
    </button>
  </div>

  <p class="check-inbox">Free Masterclass &nbsp;·&nbsp; 90 min &nbsp;·&nbsp; Nina Rose</p>

  <script>
    (function() {
      var target = new Date('2026-07-07T07:00:00Z'); // 2 PM Bangkok = UTC+7
      function tick() {
        var now = new Date();
        var diff = target - now;
        if (diff <= 0) {
          document.querySelector('.countdown').style.display = 'none';
          document.querySelector('.countdown-caption').textContent = 'It\'s today. See you soon ♡';
          return;
        }
        var days = Math.floor(diff / 86400000);
        var hours = Math.floor((diff % 86400000) / 3600000);
        var mins = Math.floor((diff % 3600000) / 60000);
        var secs = Math.floor((diff % 60000) / 1000);
        document.getElementById('cd-days').textContent = String(days).padStart(2,'0');
        document.getElementById('cd-hours').textContent = String(hours).padStart(2,'0');
        document.getElementById('cd-minutes').textContent = String(mins).padStart(2,'0');
        document.getElementById('cd-seconds').textContent = String(secs).padStart(2,'0');
      }
      tick();
      setInterval(tick, 1000);
    })();

    function copyLink(btn) {
      navigator.clipboard.writeText('https://masterclass-july.vercel.app').then(function() {
        btn.classList.add('copied');
        btn.querySelector('span').textContent = 'Link copied ♡';
        setTimeout(function() {
          btn.classList.remove('copied');
          btn.querySelector('span').textContent = 'Copy the link';
        }, 3000);
      });
    }
  </script>

</body>
</html>
